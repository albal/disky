version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: disky_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-disky}
      POSTGRES_USER: ${POSTGRES_USER:-disky}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-disky} -d ${POSTGRES_DB:-disky}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disky_net

  backend:
    image: ghcr.io/albal/disky/disky-backend:latest
    container_name: disky_backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - disky_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/albal/disky/disky-frontend:latest
    container_name: disky_frontend
    restart: unless-stopped
    networks:
      - disky_net

  caddy:
    image: caddy:2-alpine
    container_name: disky_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - disky_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  disky_net:
    driver: bridge
